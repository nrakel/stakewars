<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#14201c" />
    <title>StakeWars Offline</title>
    <style>
      :root {
        color: #14201c;
        background: #f4f6f2;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        display: grid;
        gap: 16px;
        border: 1px solid #dfe5df;
        border-radius: 8px;
        background: #ffffff;
        padding: 24px;
        box-shadow: 5px 6px 0 #d1d5db;
      }

      img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        background: #050505;
        border-radius: 8px;
        padding: 6px;
      }

      h1,
      p {
        margin: 0;
      }

      p {
        color: #65736d;
      }

      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 6px;
        background: #ff6900;
        color: #ffffff;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icons/icon-192.png" alt="" />
      <h1>StakeWars is offline</h1>
      <p>The app shell is available, but live lines, wagers, and leaderboard data need a connection.</p>
      <a href="/">Retry</a>
    </main>
  </body>
</html>
